<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="container">
        <div class="inputs">
            <input type="number" placeholder="Row" class="r">
            <input type="number" placeholder="Column" class="c">

            <button class="btn" onclick="btn()">Create</button>
        </div>
        <div class="canvas">
            <table></table>
            <div class="settings">
                <input type="color" id="color" class="color">
                <input type="range" class="slider" value="20">
                <img src="Assets/eraser.svg" alt="" srcset="" class="eraser">
                <div class="borderless highlight">
                    <div class="icon"></div>
                </div>

                <button class="save">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 15V3m0 12l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M2 17l.621 2.485A2 2 0 004.561 21H19.439a2 2 0 001.94-1.515L22 17"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>

                </button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
