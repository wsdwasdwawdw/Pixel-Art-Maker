<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="container">
        <div class="inputs">
            <input type="number" placeholder="Row" class="r">
            <input type="number" placeholder="Column" class="c">

            <button class="btn" onclick="btn()">Create</button>
        </div>
        <div class="canvas">
            <table></table>
            <div class="settings">
                <input type="color" id="color" class="color">
                <input type="range" class="slider" value="20">
                <img src="Assets/eraser.svg" alt="" srcset="" class="eraser">
                <div class="borderless highlight">
                    <div class="icon"></div>
                </div>

                <button class="save">Save</button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
